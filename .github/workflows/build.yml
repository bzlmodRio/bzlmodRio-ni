name: Build example project
on: [pull_request, push]
jobs:
  build_windows:
    strategy:
      fail-fast: false
      matrix:
        include:
        # Build standard, native
        - { os: windows-latest, command: "test",  config: "--config=windows" }
        - { os: ubuntu-latest,  command: "test",  config: "--config=linux --test_tag_filters=-bazelrio-java-test" }
        - { os: macos-latest,   command: "build", config: "--config=macos --build_tag_filters=-bazelrio-java-test --test_tag_filters=-bazelrio-java-test" }

        # Build standard, roborio
        - { os: windows-latest, command: "build", config: "--config=roborio" }
        - { os: ubuntu-latest,  command: "build", config: "--config=roborio" }
        - { os: macos-latest,   command: "build", config: "--config=roborio" }
        
        # Build bzlmod, native
        - { os: windows-latest, command: "test",  config: "--enable_bzlmod --config=windows" }
        - { os: ubuntu-latest,  command: "test",  config: "--enable_bzlmod --config=linux --test_tag_filters=-bazelrio-java-test" }
        - { os: macos-latest,   command: "build", config: "--enable_bzlmod --config=macos --build_tag_filters=-bazelrio-java-test --test_tag_filters=-bazelrio-java-test" }

        # Build bzlmod, roborio
        - { os: windows-latest, command: "build", config: "--enable_bzlmod --config=roborio" }
        - { os: ubuntu-latest,  command: "build", config: "--enable_bzlmod --config=roborio" }
        - { os: macos-latest,   command: "build", config: "--enable_bzlmod --config=roborio" }
    name: "Build Tests - ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v2
    - run: bazel ${{ matrix.command }} //... -k ${{ matrix.config }} --verbose_failures
      working-directory: tests